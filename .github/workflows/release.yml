name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 태그 푸시 시 CI 테스트 먼저 실행
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test

  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Test build
        run: npm run test:build

  # 테스트 통과 후 릴리스 빌드
  build-windows:
    needs: [test, build-test]
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Package MSI installer
        run: npm run dist:win-msi
        
      - name: Get version from tag
        id: get_version
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: powershell
        
      - name: Find MSI file
        id: find_msi
        run: |
          $msiFile = Get-ChildItem -Path "release" -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($msiFile) {
            echo "MSI_PATH=$($msiFile.FullName)" >> $env:GITHUB_OUTPUT
            echo "MSI_NAME=$($msiFile.Name)" >> $env:GITHUB_OUTPUT
          } else {
            echo "No MSI file found"
            exit 1
          }
        shell: powershell
        
      - name: Create GitHub Release and Upload MSI
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $releaseNotes = @"
          ## Sebastian v${{ steps.get_version.outputs.VERSION }}

          ### Changes
          - Automatically built Windows MSI installer
          - Fixed electron-store packaging with complete dependency unpacking
          - All tests passed before release

          ### Installation
          1. Download ``Sebastian-${{ steps.get_version.outputs.VERSION }}-Setup.msi`` file
          2. Run the file to start installation

          ### System Requirements
          - Windows 10 or later
          - x64 architecture
          "@
          
          gh release create "v${{ steps.get_version.outputs.VERSION }}" --title "Sebastian v${{ steps.get_version.outputs.VERSION }}" --notes $releaseNotes "${{ steps.find_msi.outputs.MSI_PATH }}"
          
      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sebastian-msi-installer
          path: ${{ steps.find_msi.outputs.MSI_PATH }}
          retention-days: 30