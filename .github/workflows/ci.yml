name: CI

on:
  push:
    branches: [ main ]
    # 태그 푸시는 제외 (release 워크플로우에서 처리)
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ main ]

# 동시 실행 방지 - 같은 브랜치에서 CI 중복 실행 방지
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    outputs:
      build-cache-key: ${{ steps.cache-key.outputs.key }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Cache dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
          
      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci
        
      - name: TypeScript checks (parallel)
        run: |
          echo "Running TypeScript checks in parallel..."
          npx tsc --noEmit --project tsconfig.json &
          PID1=$!
          npx tsc --noEmit --project tsconfig.main.json &
          PID2=$!
          
          # Wait for both processes and capture exit codes
          wait $PID1
          RESULT1=$?
          wait $PID2
          RESULT2=$?
          
          # Check results
          if [ $RESULT1 -ne 0 ]; then
            echo "❌ TypeScript check failed for tsconfig.json"
            exit 1
          fi
          if [ $RESULT2 -ne 0 ]; then
            echo "❌ TypeScript check failed for tsconfig.main.json"
            exit 1
          fi
          
          echo "✅ All TypeScript checks passed"
        
      - name: Validate source files
        run: |
          echo "Validating TypeScript source files..."
          # Check if TypeScript files exist and are accessible
          find src -name "*.ts" -o -name "*.tsx" | head -10
          echo "✅ Source files validation completed"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=build-${{ github.sha }}-${{ github.run_number }}" >> $GITHUB_OUTPUT

  build-and-test:
    name: Build and Test
    needs: code-quality
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Cache dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
          
      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci
        
      - name: Cache build output
        uses: actions/cache@v4
        id: build-cache
        with:
          path: |
            dist/
            .vite/
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-
        
      - name: Build application
        run: npm run build
        
      - name: Verify build output
        run: |
          if (!(Test-Path "dist")) {
            echo "❌ Build failed: dist directory not found"
            exit 1
          }
          echo "✅ Build successful: dist directory created"
          
          # Check for essential files
          if (!(Test-Path "dist/main/index.js")) {
            echo "❌ Main process build failed"
            exit 1
          }
          echo "✅ Main process built successfully"
          
          if (!(Test-Path "dist/renderer")) {
            echo "❌ Renderer build failed"
            exit 1
          }
          echo "✅ Renderer built successfully"
          
          if (!(Test-Path "dist/preload/index.js")) {
            echo "❌ Preload script build failed"
            exit 1
          }
          echo "✅ Preload script built successfully"
        shell: powershell
        
      - name: Run tests
        run: |
          echo "Running test suite..."
          npm test
          if ($LASTEXITCODE -ne 0) {
            echo "❌ Tests failed"
            exit 1
          }
          echo "✅ All tests passed"
        shell: powershell
        
      - name: Test electron packaging
        run: |
          echo "Testing electron packaging without installer creation..."
          npm run pack
          
          if (!(Test-Path "release")) {
            echo "❌ Packaging failed: release directory not found"
            exit 1
          }
          echo "✅ Electron packaging successful"
        shell: powershell
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ needs.code-quality.outputs.build-cache-key }}
          path: |
            dist/
            test-report.json
          retention-days: 7
          if-no-files-found: error

  status-check:
    name: CI Status Check
    needs: [code-quality, build-and-test]
    runs-on: ubuntu-latest
    if: always()
    outputs:
      ci-success: ${{ steps.check.outputs.success }}
    
    steps:
      - name: Check CI status
        id: check
        run: |
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "❌ Code quality check failed"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "❌ Build and test failed"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ All CI checks passed successfully"
          echo "🎉 CI workflow completed - ready for build"
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Create status indicator
        run: |
          echo "CI_STATUS=success" >> $GITHUB_ENV
          echo "BUILD_CACHE_KEY=${{ needs.code-quality.outputs.build-cache-key }}" >> $GITHUB_ENV