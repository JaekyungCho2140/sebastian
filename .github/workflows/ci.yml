name: CI

on:
  push:
    branches: [ main ]
    # 태그 푸시는 제외 (release 워크플로우에서 처리)
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ main ]

# 동시 실행 방지 - 같은 브랜치에서 CI 중복 실행 방지
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    outputs:
      build-cache-key: ${{ steps.cache-key.outputs.key }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript type check
        run: npx tsc --noEmit --project tsconfig.json
        
      - name: TypeScript main check
        run: npx tsc --noEmit --project tsconfig.main.json
        
      - name: Validate source files
        run: |
          echo "Validating TypeScript source files..."
          # Check if TypeScript files exist and are accessible
          find src -name "*.ts" -o -name "*.tsx" | head -10
          echo "✅ Source files validation completed"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=build-${{ github.sha }}-${{ github.run_number }}" >> $GITHUB_OUTPUT

  build-verification:
    name: Build Verification
    needs: code-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          echo "✅ Build successful: dist directory created"
          
          # Check for essential files
          if [ ! -f "dist/main/index.js" ]; then
            echo "❌ Main process build failed"
            exit 1
          fi
          echo "✅ Main process built successfully"
          
          if [ ! -d "dist/renderer" ]; then
            echo "❌ Renderer build failed"
            exit 1
          fi
          echo "✅ Renderer built successfully"
          
          if [ ! -f "dist/preload/preload/index.js" ]; then
            echo "❌ Preload script build failed"
            exit 1
          fi
          echo "✅ Preload script built successfully"
        shell: bash
        
      - name: Test electron packaging (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Testing electron packaging without installer creation..."
          npm run pack
          
          if [ ! -d "release" ]; then
            echo "❌ Packaging failed: release directory not found"
            exit 1
          fi
          echo "✅ Electron packaging successful"
        
      - name: Upload build artifacts (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ needs.code-quality.outputs.build-cache-key }}
          path: |
            dist/
            release/
          retention-days: 7

  status-check:
    name: CI Status Check
    needs: [code-quality, build-verification]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "❌ Code quality check failed"
            exit 1
          fi
          
          if [ "${{ needs.build-verification.result }}" != "success" ]; then
            echo "❌ Build verification failed"
            exit 1
          fi
          
          echo "✅ All CI checks passed successfully"
          echo "🚀 Ready for release deployment"

      - name: Create status indicator
        run: |
          echo "CI_STATUS=success" >> $GITHUB_ENV
          echo "BUILD_CACHE_KEY=${{ needs.code-quality.outputs.build-cache-key }}" >> $GITHUB_ENV

  # CI 성공 시 자동 릴리즈 트리거
  trigger-release:
    name: Trigger Release
    needs: [code-quality, build-verification]
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Get current version and increment
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          
          # 패치 버전 자동 증가
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
      - name: Update package.json version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          
      - name: Commit version update
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: 버전 ${{ steps.version.outputs.version }}로 업데이트"
          
      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          
      - name: Trigger Release Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                version: '${{ steps.version.outputs.version }}',
                skip_ci_check: 'true'
              }
            });
            console.log('✅ Release workflow triggered successfully');
            console.log('Version:', '${{ steps.version.outputs.version }}');